name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAKEPAD_BRANCH: small_web_nits
  APP_PACKAGE: makepad-gallery
  WASM_BINDGEN_VERSION: 0.2.114

jobs:
  deploy-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository && (github.event.action == 'closed' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        if: github.event.action != 'closed'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Checkout sibling makepad workspace
        if: github.event.action != 'closed'
        run: git clone --depth 1 --branch "${MAKEPAD_BRANCH}" https://github.com/wheregmis/makepad.git "${GITHUB_WORKSPACE}/../makepad"

      - name: Install system dependencies
        if: github.event.action != 'closed'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev clang lld binaryen

      - name: Install Rust toolchain
        if: github.event.action != 'closed'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo files
        if: github.event.action != 'closed'
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-makepad
        if: github.event.action != 'closed'
        run: cargo install --path "${GITHUB_WORKSPACE}/../makepad/tools/cargo_makepad" --locked --force

      - name: Install Wasm toolchain
        if: github.event.action != 'closed'
        run: cargo makepad wasm install-toolchain

      - name: Install wasm-bindgen CLI
        if: github.event.action != 'closed'
        run: cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked --force

      - name: Build gallery preview
        if: github.event.action != 'closed'
        run: ./scripts/build_wasm.sh -p "${APP_PACKAGE}" --profile small --bindgen --no-threads --no-brotli

      - name: Patch index.html for GitHub Pages subpath hosting
        if: github.event.action != 'closed'
        run: |
          APP_DIR="target/makepad-wasm-app/small/${APP_PACKAGE}"
          INDEX_FILE="${APP_DIR}/index.html"
          NOT_FOUND_FILE="${APP_DIR}/404.html"
          SNIPPET_FILE="$(mktemp)"
          TMP_FILE="$(mktemp)"

          cat > "${SNIPPET_FILE}" <<'EOF'
            const makepadBasePath = (() => {
                const p = window.location.pathname || "/";
                const slash = p.lastIndexOf("/");
                return slash >= 0 ? p.slice(0, slash + 1) : "/";
            })();
            const rewriteMakepadUrl = (url) => {
                if (typeof url !== "string" || !url.startsWith("/")) {
                    return url;
                }
                if (!(url.startsWith("/makepad_") || url.startsWith("/$report_error"))) {
                    return url;
                }
                if (makepadBasePath === "/") {
                    return url;
                }
                return makepadBasePath.replace(/\/$/, "") + url;
            };
            const originalFetch = window.fetch.bind(window);
            window.fetch = (input, init) => {
                if (typeof input === "string") {
                    return originalFetch(rewriteMakepadUrl(input), init);
                }
                if (input instanceof Request) {
                    const rewritten = rewriteMakepadUrl(input.url);
                    if (rewritten !== input.url) {
                        input = new Request(rewritten, input);
                    }
                }
                return originalFetch(input, init);
            };
          EOF

          awk -v snippet="${SNIPPET_FILE}" '
            { print }
            $0 ~ /<script type='\''module'\''>/ && inserted == 0 {
              while ((getline line < snippet) > 0) print line
              close(snippet)
              inserted = 1
            }
          ' "${INDEX_FILE}" > "${TMP_FILE}"

          mv "${TMP_FILE}" "${INDEX_FILE}"
          cp "${INDEX_FILE}" "${NOT_FOUND_FILE}"
          rm -f "${INDEX_FILE}.br"
          rm -f "${NOT_FOUND_FILE}.br"

      - name: Deploy preview
        if: github.event.action != 'closed'
        id: preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: target/makepad-wasm-app/small/${{ env.APP_PACKAGE }}
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy
          wait-for-pages-deployment: true
          qr-code: false

      - name: Remove preview
        if: github.event.action == 'closed'
        uses: rossjrw/pr-preview-action@v1
        with:
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
          qr-code: false
