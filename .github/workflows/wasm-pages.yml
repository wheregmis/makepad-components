name: Build And Deploy Makepad Wasm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package:
        description: Cargo package/profile name for `cargo makepad wasm build -p`
        required: false
        default: makepad-example-component-gallery

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev clang lld binaryen

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo files
        uses: Swatinem/rust-cache@v2

      - name: Resolve app package
        run: |
          APP_PACKAGE="${{ github.event.inputs.package }}"
          if [ -z "${APP_PACKAGE}" ]; then
            APP_PACKAGE="makepad-example-component-gallery"
          fi
          echo "APP_PACKAGE=${APP_PACKAGE}" >> "${GITHUB_ENV}"
          echo "WASM_OUTPUT_ROOT=target/makepad-wasm-app/small" >> "${GITHUB_ENV}"

      - name: Install cargo-makepad
        run: cargo install --git https://github.com/wheregmis/makepad.git --branch wasm_binary_optimizations cargo-makepad --locked

      - name: Install Wasm toolchain
        run: cargo makepad wasm install-toolchain

      - name: Build Wasm package (small profile, no bindgen)
        run: ./scripts/build_wasm.sh -p "${APP_PACKAGE}"

      - name: Patch index.html for GitHub Pages subpath hosting
        run: |
          APP_DIR="target/makepad-wasm-app/small/${APP_PACKAGE}"
          INDEX_FILE="${APP_DIR}/index.html"
          SNIPPET_FILE="$(mktemp)"
          TMP_FILE="$(mktemp)"

          cat > "${SNIPPET_FILE}" <<'EOF'
            const makepadBasePath = (() => {
                const p = window.location.pathname || "/";
                const slash = p.lastIndexOf("/");
                return slash >= 0 ? p.slice(0, slash + 1) : "/";
            })();
            const rewriteMakepadUrl = (url) => {
                if (typeof url !== "string" || !url.startsWith("/")) {
                    return url;
                }
                if (!(url.startsWith("/makepad_") || url.startsWith("/$report_error"))) {
                    return url;
                }
                if (makepadBasePath === "/") {
                    return url;
                }
                return makepadBasePath.replace(/\/$/, "") + url;
            };
            const originalFetch = window.fetch.bind(window);
            window.fetch = (input, init) => {
                if (typeof input === "string") {
                    return originalFetch(rewriteMakepadUrl(input), init);
                }
                if (input instanceof Request) {
                    const rewritten = rewriteMakepadUrl(input.url);
                    if (rewritten !== input.url) {
                        input = new Request(rewritten, input);
                    }
                }
                return originalFetch(input, init);
            };
          EOF

          awk -v snippet="${SNIPPET_FILE}" '
            { print }
            $0 ~ /<script type='\''module'\''>/ && inserted == 0 {
              while ((getline line < snippet) > 0) print line
              close(snippet)
              inserted = 1
            }
          ' "${INDEX_FILE}" > "${TMP_FILE}"

          mv "${TMP_FILE}" "${INDEX_FILE}"
          rm -f "${INDEX_FILE}.br"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/makepad-wasm-app/small/${{ env.APP_PACKAGE }}

  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
