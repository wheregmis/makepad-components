name: Deploy Makepad Wasm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package:
        description: Cargo package/profile name for `cargo makepad wasm build -p`
        required: false
        default: makepad-gallery

permissions:
  contents: write

concurrency:
  group: wasm-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAKEPAD_GIT_BRANCH: dev

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout sibling makepad workspace
        run: git clone --depth 1 --branch "${MAKEPAD_GIT_BRANCH}" https://github.com/wheregmis/makepad.git "${GITHUB_WORKSPACE}/../makepad"

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev clang lld binaryen

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo files
        uses: Swatinem/rust-cache@v2

      - name: Resolve app package
        run: |
          APP_PACKAGE="${{ github.event.inputs.package }}"
          if [ -z "${APP_PACKAGE}" ]; then
            APP_PACKAGE="makepad-gallery"
          fi
          echo "APP_PACKAGE=${APP_PACKAGE}" >> "${GITHUB_ENV}"
          echo "WASM_OUTPUT_ROOT=target/makepad-wasm-app/small" >> "${GITHUB_ENV}"

      - name: Install cargo-makepad
        run: cargo install --path "${GITHUB_WORKSPACE}/../makepad/tools/cargo_makepad" --locked --force

      - name: Install Wasm toolchain
        run: cargo makepad wasm install-toolchain

      - name: Build Wasm package
        run: ./scripts/build_wasm.sh -p "${APP_PACKAGE}" --no-threads

      - name: Patch index.html for GitHub Pages subpath hosting
        run: |
          APP_DIR="target/makepad-wasm-app/small/${APP_PACKAGE}"
          INDEX_FILE="${APP_DIR}/index.html"
          NOT_FOUND_FILE="${APP_DIR}/404.html"
          SNIPPET_FILE="$(mktemp)"
          TMP_FILE="$(mktemp)"

          cat > "${SNIPPET_FILE}" <<'EOF'
            const makepadBasePath = (() => {
                const p = window.location.pathname || "/";
                const slash = p.lastIndexOf("/");
                return slash >= 0 ? p.slice(0, slash + 1) : "/";
            })();
            const rewriteMakepadUrl = (url) => {
                if (typeof url !== "string" || !url.startsWith("/")) {
                    return url;
                }
                if (!(url.startsWith("/makepad_") || url.startsWith("/$report_error"))) {
                    return url;
                }
                if (makepadBasePath === "/") {
                    return url;
                }
                return makepadBasePath.replace(/\/$/, "") + url;
            };
            const originalFetch = window.fetch.bind(window);
            window.fetch = (input, init) => {
                if (typeof input === "string") {
                    return originalFetch(rewriteMakepadUrl(input), init);
                }
                if (input instanceof Request) {
                    const rewritten = rewriteMakepadUrl(input.url);
                    if (rewritten !== input.url) {
                        input = new Request(rewritten, input);
                    }
                }
                return originalFetch(input, init);
            };
          EOF

          awk -v snippet="${SNIPPET_FILE}" '
            { print }
            $0 ~ /<script type='\''module'\''>/ && inserted == 0 {
              while ((getline line < snippet) > 0) print line
              close(snippet)
              inserted = 1
            }
          ' "${INDEX_FILE}" > "${TMP_FILE}"

          mv "${TMP_FILE}" "${INDEX_FILE}"
          cp "${INDEX_FILE}" "${NOT_FOUND_FILE}"
          rm -f "${INDEX_FILE}.br"
          rm -f "${NOT_FOUND_FILE}.br"

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: target/makepad-wasm-app/small/${{ env.APP_PACKAGE }}
          clean: true
          clean-exclude: |
            pr-preview
          force: false
