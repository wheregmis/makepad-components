name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAKEPAD_BRANCH: small_web_nits

jobs:
  cargo-check:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # - ubuntu-latest
          - macos-latest
          # - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout sibling makepad workspace
        shell: bash
        run: git clone --depth 1 --branch "${MAKEPAD_BRANCH}" https://github.com/wheregmis/makepad.git "${GITHUB_WORKSPACE}/../makepad"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev clang lld

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo files
        uses: Swatinem/rust-cache@v2

      - name: Run cargo check
        run: cargo check --workspace --locked

  cargo-check-wasm:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: cargo check (wasm32-unknown-unknown)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout sibling makepad workspace
        shell: bash
        run: git clone --depth 1 --branch "${MAKEPAD_BRANCH}" https://github.com/wheregmis/makepad.git "${GITHUB_WORKSPACE}/../makepad"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo files
        uses: Swatinem/rust-cache@v2

      - name: Run cargo check for the gallery wasm target
        run: cargo check -p makepad-gallery --target wasm32-unknown-unknown --locked
